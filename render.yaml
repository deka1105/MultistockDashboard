# ─────────────────────────────────────────────────────────────────────────────
# StockDash — Render Blueprint
#
# Repo structure:
#   repo-root/
#     backend/          ← rootDir for Docker services
#       Dockerfile
#       requirements.txt
#       entrypoint.sh
#       app/
#     frontend/         ← rootDir for static site
#       package.json
#       src/
#     render.yaml       ← this file (at repo root)
#
# Deploy: dashboard.render.com → New → Blueprint Instance
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Redis Key Value ──────────────────────────────────────────────────────────
  - type: keyvalue
    name: stockdash-redis
    plan: free
    maxmemoryPolicy: noeviction

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: stockdash-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://stockdash-frontend.onrender.com
      - key: FINNHUB_API_KEY
        value: ""
    # startCommand is run as: bash -c "command"
    # $PORT is set by Render automatically (usually 10000)
    # ./entrypoint.sh handles migrations then starts uvicorn
    startCommand: ./entrypoint.sh uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --proxy-headers --forwarded-allow-ips='*'

  # ── Celery Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: stockdash-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: FINNHUB_API_KEY
        value: ""
    # Workers do NOT run migrations (entrypoint.sh skips them when $1 != uvicorn)
    startCommand: ./entrypoint.sh celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  # ── Celery Beat ──────────────────────────────────────────────────────────────
  - type: worker
    name: stockdash-beat
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: FINNHUB_API_KEY
        value: ""
    startCommand: ./entrypoint.sh celery -A app.workers.celery_app beat --loglevel=info

  # ── React Frontend (Static Site) ─────────────────────────────────────────────
  - type: web
    name: stockdash-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      # SPA fallback — all paths serve index.html (React Router handles routing)
      - type: rewrite
        source: /*
        destination: /index.html

# ── Managed PostgreSQL ────────────────────────────────────────────────────────
databases:
  - name: stockdash-db
    databaseName: stockdash
    user: stockdash
    plan: free
    ipAllowList: []
