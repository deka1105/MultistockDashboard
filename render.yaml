# ─────────────────────────────────────────────────────────────────────────────
# StockDash — Render Blueprint  (render.yaml at repo root)
#
# REPO STRUCTURE EXPECTED:
#   repo-root/
#     backend/          ← Python/FastAPI (rootDir for Docker services)
#       Dockerfile
#       requirements.txt
#       entrypoint.sh
#       app/
#     frontend/         ← React/Vite (built as static site)
#       src/
#       package.json
#     render.yaml       ← THIS FILE
#     docker-compose.yml
#
# Deploy: dashboard.render.com → New → Blueprint Instance → connect repo
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 0. Redis Key Value ─────────────────────────────────────────────────────
  - type: keyvalue
    name: stockdash-redis
    plan: free
    maxmemoryPolicy: noeviction

  # ── 1. FastAPI Backend ─────────────────────────────────────────────────────
  - type: web
    name: stockdash-api
    runtime: docker
    # rootDir: set to backend/ so all paths in Dockerfile are relative to it
    rootDir: backend
    # With rootDir=backend, dockerfilePath is just "Dockerfile" (already in backend/)
    # and dockerContext is "." meaning the backend/ directory itself
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://stockdash-frontend.onrender.com
      - key: FINNHUB_API_KEY
        value: ""
    startCommand: >-
      ./entrypoint.sh
      uvicorn app.main:app
      --host 0.0.0.0
      --port $PORT
      --workers 2
      --proxy-headers
      --forwarded-allow-ips='*'

  # ── 2. Celery Worker ───────────────────────────────────────────────────────
  - type: worker
    name: stockdash-worker
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: FINNHUB_API_KEY
        value: ""
    startCommand: >-
      ./entrypoint.sh
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2

  # ── 3. Celery Beat Scheduler ───────────────────────────────────────────────
  - type: worker
    name: stockdash-beat
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: FINNHUB_API_KEY
        value: ""
    startCommand: >-
      ./entrypoint.sh
      celery -A app.workers.celery_app beat
      --loglevel=info

  # ── 4. React Frontend (Static Site) ───────────────────────────────────────
  - type: web
    name: stockdash-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── Managed PostgreSQL ─────────────────────────────────────────────────────────
databases:
  - name: stockdash-db
    databaseName: stockdash
    user: stockdash
    plan: free
    ipAllowList: []
