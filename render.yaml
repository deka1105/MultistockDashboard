# ─────────────────────────────────────────────────────────────────────────────
# StockDash — Render Blueprint
# Defines all infrastructure as code. Commit this file to your repo root.
# Deploy at: dashboard.render.com → Blueprints → New Blueprint Instance
#
# Services created:
#   1. stockdash-api      — FastAPI web service (free or starter plan)
#   2. stockdash-worker   — Celery task worker  (starter plan required)
#   3. stockdash-beat     — Celery beat scheduler (starter plan required)
#   4. stockdash-frontend — Vite/React static site (free)
#   5. stockdash-db       — PostgreSQL 15 database
#   6. stockdash-redis    — Redis Key Value store
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 0. Redis Key Value Store ───────────────────────────────────────────────
  - type: keyvalue
    name: stockdash-redis
    plan: free              # Free tier: 25MB. Use starter ($10/mo) for production.
    maxmemoryPolicy: noeviction   # Prevent task loss when memory fills

  # ── 1. FastAPI Backend API ──────────────────────────────────────────────────
  - type: web
    name: stockdash-api
    runtime: docker
    # Point to the backend/ subdirectory which contains the Dockerfile
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter           # Use 'free' for testing (spins down after 15min idle)
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random value
      # Database — populated from the managed PostgreSQL instance below
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      # Redis — populated from the managed Key Value instance below
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      # CORS — set to your frontend's onrender.com URL after first deploy
      - key: ALLOWED_ORIGINS
        value: https://stockdash-frontend.onrender.com
      # Finnhub — set to your real key (leave empty for mock mode)
      - key: FINNHUB_API_KEY
        value: ""
    startCommand: >-
      ./entrypoint.sh
      uvicorn app.main:app
      --host 0.0.0.0
      --port $PORT
      --workers 2
      --proxy-headers
      --forwarded-allow-ips='*'

  # ── 2. Celery Worker ────────────────────────────────────────────────────────
  - type: worker
    name: stockdash-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter             # Background workers require at least starter plan
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: FINNHUB_API_KEY
        value: ""
    startCommand: >-
      ./entrypoint.sh
      celery -A app.workers.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q celery,default

  # ── 3. Celery Beat Scheduler ────────────────────────────────────────────────
  - type: worker
    name: stockdash-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: FINNHUB_API_KEY
        value: ""
    startCommand: >-
      ./entrypoint.sh
      celery -A app.workers.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler

  # ── 4. React Frontend (Static Site) ────────────────────────────────────────
  - type: web
    name: stockdash-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    autoDeploy: true
    headers:
      # Security headers
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      # SPA fallback — all routes serve index.html (React Router handles routing)
      - type: rewrite
        source: /*
        destination: /index.html

# ── Managed Databases ──────────────────────────────────────────────────────────
databases:
  - name: stockdash-db
    databaseName: stockdash
    user: stockdash
    plan: free               # Free tier: 90-day expiry, 1GB. Upgrade for production.
    ipAllowList: []          # Only allow internal Render network access


