services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: keyvalue
    name: stockdash-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  # ── FastAPI ───────────────────────────────────────────────────────────────
  - type: web
    name: stockdash-api
    runtime: docker
    dockerContext: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://stockdash-frontend.onrender.com,https://multistockdashboard.onrender.com,https://multistock-dashboard.vercel.app
      - key: FINNHUB_API_KEY
        value: ""
    dockerCommand: bash entrypoint.sh uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2 --proxy-headers --forwarded-allow-ips='*'

  # ── Celery Worker ─────────────────────────────────────────────────────────
  - type: worker
    name: stockdash-worker
    runtime: docker
    dockerContext: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: FINNHUB_API_KEY
        value: ""
    dockerCommand: bash entrypoint.sh celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  # ── Celery Beat ───────────────────────────────────────────────────────────
  - type: worker
    name: stockdash-beat
    runtime: docker
    dockerContext: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: stockdash-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: stockdash-redis
          property: connectionString
      - key: FINNHUB_API_KEY
        value: ""
    dockerCommand: bash entrypoint.sh celery -A app.workers.celery_app beat --loglevel=info

  # ── React Frontend (Static) ───────────────────────────────────────────────
  - type: web
    name: stockdash-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    plan: free
    autoDeploy: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL ────────────────────────────────────────────────────────────
databases:
  - name: stockdash-db
    databaseName: stockdash
    user: stockdash
    plan: free
    ipAllowList: []
